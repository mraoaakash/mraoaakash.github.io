<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publications | Aakash Rao</title>
  <meta name="description" content="Publications by Aakash Rao.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="publications-page">
  <nav class="topbar">
    <div class="container topbar-inner">
      <a class="site-name" href="index.html">Aakash Rao</a>
      <div class="topbar-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Switch to dark mode">
          <i class="fa-solid fa-moon" aria-hidden="true"></i>
        </button>
        <div class="menu-dropdown">
          <button class="menu-button" id="menuToggle" aria-label="Toggle menu" aria-haspopup="true" aria-expanded="false" aria-controls="topMenu">
            <i class="fa-solid fa-bars" aria-hidden="true"></i>
            <span>Menu</span>
          </button>
          <ul class="menu-list" id="topMenu" hidden>
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="publications.html">Publications</a></li>
            <li><a href="cv.html">CV</a></li>
            <li><a href="random.html">Random</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <main class="container pub-main">
    <section class="pub-section" aria-labelledby="pub-title">
      <div class="pub-heading">
        <h1 id="pub-title">Publications</h1>
        <hr>
      </div>

      <div class="pub-key-carousel" aria-label="Key publications carousel">
        <button class="pub-arrow" id="pubPrev" aria-label="Previous publications">
          <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
        </button>
        <div class="pub-key-track-wrap" id="pubKeyTrackWrap">
          <div class="pub-key-track" id="pubKeyTrack"></div>
        </div>
        <button class="pub-arrow" id="pubNext" aria-label="Next publications">
          <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
        </button>
      </div>

      <div class="pub-tags" id="pubTags"></div>

      <div class="pub-filter-row">
        <div class="pub-search">
          <input type="text" id="pubSearchInput" class="pub-search-input" placeholder="Search...">
          <button id="pubSearchBtn" class="pub-search-btn" aria-label="Search publications">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
          </button>
        </div>
        <button id="pubResetBtn" class="pub-reset-btn">Reset</button>
      </div>

      <ul class="pub-list" id="pubList" aria-live="polite"></ul>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Aakash Rao · Last updated: <span class="last-updated">--</span></p>
    </div>
  </footer>

  <script src="publications.js"></script>
  <script src="script.js"></script>
</body>
</html>
